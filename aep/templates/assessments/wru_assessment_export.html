{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block head_title %}DCCAEP | WRU Assessment Export{% endblock head_title %}

{% block content %}
    <h1>WRU Assessment Export</h1>
    <div class="well">
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% crispy form %}
            <button type="submit" class="btn btn-default">Export</button>
        </form>
    </div>
{% endblock content %}
